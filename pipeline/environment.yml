name: insar-pipeline
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - gdal>=3.7
  - rasterio>=1.3
  - xarray>=2023.1
  - netcdf4
  - h5py>=3.9
  - numpy>=1.24
  - scipy>=1.11
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - matplotlib>=3.7
  - click>=8.1
  - tqdm>=4.65
  - zarr>=2.16
  - pyproj>=3.6
  - shapely>=2.0
  - pyyaml>=6.0
  - python-dotenv>=1.0
  - boto3>=1.28       # S3-compatible uploads to Cloudflare R2
  - pysolid           # pre-built Fortran binary — must be installed via conda, not pip
  - pip
  - pip:
    - mintpy>=1.5.3
    - hyp3-sdk>=4.0
    - asf-search>=6.0
    - rio-cogeo>=3.5
    - rio-tiler>=4.1
    - ruptures>=1.1.7  # change-point detection
    - Pillow>=10.0
